<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 반 자리 바꾸기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Nanum+Gothic:wght@400;700&family=Gamja+Flower&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2; --accent: #FF6B6B; --bg: #F8FAFC; --container-bg: #FFFFFF;
            --desk: #FFFFFF; --board: #2D5A27; --text: #333; --border: #CBD5E1; --font: 'Nanum Gothic', sans-serif;
        }
        body.theme-space {
            --primary: #5BC0BE; --accent: #FF6B6B; --bg: #050A18; --container-bg: rgba(10, 20, 40, 0.9);
            --desk: rgba(255, 255, 255, 0.15); --board: #1A3A1A; --text: #FFFFFF; --border: rgba(91, 192, 190, 0.5); --font: 'Gaegu', cursive;
        }
        body.theme-cookie {
            --primary: #D2B48C; --accent: #E67E22; --bg: #FFF9F0; --container-bg: #FFF5E6;
            --desk: #FFFFFF; --board: #8B4513; --text: #5D4037; --border: #F3D5B5; --font: 'Gamja Flower', cursive;
        }

        body { font-family: var(--font); background-color: var(--bg); color: var(--text); margin: 0; padding: 10px; transition: 0.5s; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 95%; max-width: 900px; background: var(--container-bg); padding: 30px; border-radius: 30px; border: 3px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; z-index: 10; }

        /* 테마/파일 업로드 섹션 */
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .file-upload-label { background: var(--primary); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: bold; }

        /* 이미지 버튼 스타일 (가이드 UI 반영) */
        .step-title { font-weight: bold; margin-bottom: 10px; display: block; border-left: 4px solid var(--accent); padding-left: 10px; }
        .layout-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .img-btn { 
            background: var(--desk); border: 2px solid var(--border); border-radius: 15px; padding: 10px; cursor: pointer; 
            text-align: center; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .img-btn:hover { border-color: var(--primary); }
        .img-btn.active { border-color: var(--accent); background: rgba(255, 107, 107, 0.1); box-shadow: 0 0 10px rgba(255,107,107,0.2); }
        .img-btn svg { width: 60px; height: 40px; fill: var(--text); opacity: 0.8; }
        .img-btn span { font-size: 0.85rem; font-weight: bold; }

        /* 자리 배치 영역 */
        .blackboard { width: 200px; background: var(--board); color: white; padding: 10px; border-radius: 10px; margin: 0 auto 30px; text-align: center; font-weight: bold; }
        .desk-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .student-desk { width: 100px; height: 60px; background: var(--desk); border: 2px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; }

        .giant-ship { display: none; position: fixed; font-size: 300px; opacity: 0.1; pointer-events: none; z-index: 1; }
        body.theme-space .giant-ship { display: block; animation: fly 30s infinite linear; }
        @keyframes fly { from { left: -400px; top: 20%; } to { left: 100vw; top: 50%; } }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button.main-action { flex: 1; padding: 15px; border-radius: 15px; border: none; background: var(--accent); color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="theme-space">

<div class="giant-ship">🛸</div>

<div class="container">
    <div class="header-controls">
        <select onchange="changeTheme(this.value)" style="padding:5px; border-radius:5px; font-family:inherit;">
            <option value="theme-space">🌌 우주 여행</option>
            <option value="theme-cookie">🍪 달콤 쿠키</option>
            <option value="default">🏫 일반 테마</option>
        </select>
        <label class="file-upload-label">
            📁 명단 엑셀 업로드
            <input type="file" id="excel-input" accept=".xlsx, .csv" style="display:none;" onchange="handleExcel(event)">
        </label>
    </div>

    <div id="setup-view">
        <span class="step-title">1단계: 자리 대형 선택 (분단/모둠)</span>
        <div class="layout-grid">
            <div class="img-btn active" onclick="selectLayout(this, '2-3')">
                <svg viewBox="0 0 100 60"><rect x="10" y="10" width="20" height="15"/><rect x="40" y="10" width="20" height="15"/><rect x="70" y="10" width="20" height="15"/><rect x="10" y="35" width="20" height="15"/><rect x="40" y="35" width="20" height="15"/><rect x="70" y="35" width="20" height="15"/></svg>
                <span>3분단 (2-2-2)</span>
            </div>
            <div class="img-btn" onclick="selectLayout(this, '3-m')">
                <svg viewBox="0 0 100 60"><circle cx="30" cy="20" r="8"/><circle cx="70" cy="20" r="8"/><circle cx="50" cy="45" r="8"/></svg>
                <span>3인 모둠</span>
            </div>
            <div class="img-btn" onclick="selectLayout(this, '4-m')">
                <svg viewBox="0 0 100 60"><rect x="25" y="10" width="15" height="15"/><rect x="60" y="10" width="15" height="15"/><rect x="25" y="35" width="15" height="15"/><rect x="60" y="35" width="15" height="15"/></svg>
                <span>4인 모둠</span>
            </div>
            <div class="img-btn" onclick="selectLayout(this, '6-m')">
                <svg viewBox="0 0 100 60"><circle cx="20" cy="15" r="7"/><circle cx="50" cy="15" r="7"/><circle cx="80" cy="15" r="7"/><circle cx="20" cy="45" r="7"/><circle cx="50" cy="45" r="7"/><circle cx="80" cy="45" r="7"/></svg>
                <span>6인 모둠</span>
            </div>
        </div>

        <span class="step-title">2단계: 학생 명단 확인</span>
        <textarea id="name-input" style="width:100%; height:80px; border-radius:10px; border:2px solid var(--border); padding:10px; font-family:inherit;" placeholder="엑셀을 업로드하거나 이름을 직접 쉼표로 구분해 입력하세요."></textarea>
        
        <button class="main-action" style="margin-top:20px; width:100%;" onclick="startLayout()">자리 배치 시작하기</button>
    </div>

    <div id="main-view" style="display:none;">
        <div id="capture-area" style="padding:20px;">
            <div class="blackboard">정 면 (칠판)</div>
            <div id="desk-grid" class="desk-area"></div>
        </div>
        <div class="btn-group">
            <button class="main-action" onclick="shuffle()">✨ 다시 섞기</button>
            <button class="main-action" style="background:#2ECC71;" onclick="saveImage()">📸 이미지 저장</button>
            <button class="main-action" style="background:var(--primary);" onclick="location.reload()">🔄 처음으로</button>
        </div>
    </div>
</div>

<script>
    let students = [];
    let currentLayout = '2-3';

    function changeTheme(theme) {
        document.body.className = theme === 'default' ? '' : theme;
    }

    function handleExcel(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(firstSheet, {header: 1});
            students = json.flat().filter(n => n);
            document.getElementById('name-input').value = students.join(', ');
            alert(`${students.length}명의 명단을 불러왔습니다!`);
        };
        reader.readAsArrayBuffer(file);
    }

    function selectLayout(btn, type) {
        document.querySelectorAll('.img-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLayout = type;
    }

    function startLayout() {
        const input = document.getElementById('name-input').value;
        students = input.split(/[,\s\n]+/).filter(s => s);
        if(!students.length) return alert("학생 명단을 입력해주세요.");

        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
        
        renderDesks();
    }

    function renderDesks() {
        const grid = document.getElementById('desk-grid');
        grid.innerHTML = '';
        
        let groupSize = currentLayout.includes('-m') ? parseInt(currentLayout) : 2;
        let cols = currentLayout === '2-3' ? 3 : (currentLayout.includes('-m') ? 2 : 4);

        const groupCount = Math.ceil(students.length / groupSize);
        for(let i=0; i<groupCount; i++) {
            const groupDiv = document.createElement('div');
            groupDiv.style.display = 'grid';
            groupDiv.style.gridTemplateColumns = `repeat(${currentLayout.includes('-m') ? 2 : 1}, 1fr)`;
            groupDiv.style.gap = '10px';
            groupDiv.style.padding = '10px';
            groupDiv.style.border = '1px dashed var(--border)';
            groupDiv.style.borderRadius = '15px';

            for(let j=0; j<groupSize; j++) {
                if(i * groupSize + j < students.length) {
                    const desk = document.createElement('div');
                    desk.className = 'student-desk';
                    desk.id = `desk-${i * groupSize + j}`;
                    desk.innerText = '?';
                    groupDiv.appendChild(desk);
                }
            }
            grid.appendChild(groupDiv);
        }
        shuffle();
    }

    function shuffle() {
        const shuffled = [...students].sort(() => Math.random() - 0.5);
        students.forEach((_, i) => {
            const el = document.getElementById(`desk-${i}`);
            if(el) el.innerText = shuffled[i];
        });
    }

    function saveImage() {
        html2canvas(document.getElementById('capture-area'), { 
            backgroundColor: getComputedStyle(document.body).backgroundColor 
        }).then(canvas => {
            const a = document.createElement('a');
            a.href = canvas.toDataURL();
            a.download = '우리반_배치도.png';
            a.click();
        });
    }
</script>
</body>
</html>
