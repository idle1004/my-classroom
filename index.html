<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리반 자리바꾸기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --primary: #4A90E2; --accent: #FF6B6B; --bg: #F0F7FF; 
            --desk: #FFFFFF; --board: #2D5A27; --text: #333;
        }
        
        /* 테마별 배경 스타일 */
        body.theme-simple { background-color: #F8FAFC; background-image: radial-gradient(#CBD5E1 1px, transparent 1px); background-size: 20px 20px; }
        body.theme-cute { background-color: #FFF0F6; background-image: url("https://www.transparenttextures.com/patterns/cubes.png"); }
        body.theme-funny { background-color: #FFF9DB; background-image: linear-gradient(45deg, #FFD43B 25%, transparent 25%, transparent 50%, #FFD43B 50%, #FFD43B 75%, transparent 75%, transparent); background-size: 40px 40px; opacity: 0.9; }
        body.theme-chic { background-color: #334155; --text: #F8FAFC; --desk: #E2E8F0; }
        body.theme-custom { background-color: var(--custom-bg); }

        body { font-family: 'Nanum Gothic', sans-serif; margin: 0; padding: 20px; color: var(--text); transition: all 0.5s ease; }
        .container { max-width: 1200px; margin: auto; background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        /* 테마 선택 버튼 그룹 */
        .theme-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .theme-btn { padding: 10px 15px; border-radius: 10px; border: 2px solid #ddd; cursor: pointer; font-weight: bold; background: white; transition: 0.2s; }
        .theme-btn:hover { transform: translateY(-2px); }

        /* 기존 스타일 유지 및 개선 */
        .config-panel { background: #F8FAFC; border: 2px solid #E2E8F0; padding: 25px; border-radius: 20px; margin-bottom: 20px; position: relative; color: #333; }
        .secret-trigger { position: absolute; top: 15px; right: 20px; cursor: pointer; opacity: 0.2; font-size: 1.5rem; }
        .upload-box { border: 2px dashed var(--primary); padding: 20px; border-radius: 15px; background: white; margin-bottom: 15px; }
        #manual-input { width: 95%; height: 100px; padding: 10px; border-radius: 10px; border: 1px solid #CBD5E1; }

        #capture-area { padding: 40px 20px; border-radius: 20px; }
        .blackboard-container { display: flex; justify-content: center; margin-bottom: 50px; }
        .blackboard { 
            width: 60%; background: var(--board); color: white; padding: 25px; 
            border-radius: 10px; border: 8px solid #5D4037; font-size: 2.5rem; 
            font-weight: bold; box-shadow: 0 10px 0 #3E2723;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        
        .grid-layout { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; }
        .bundan { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

        .student-desk { 
            width: 140px; height: 90px; background: var(--desk); border: 3px solid #CBD5E1; 
            border-radius: 12px; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; font-size: 1.5rem; font-weight: bold; position: relative; 
            box-shadow: 0 4px 0 #E2E8F0; color: #333;
        }
        .desk-num { position: absolute; top: 5px; left: 8px; font-size: 0.8rem; color: #94A3B8; }
        .fixed-mark { position: absolute; top: 5px; right: 8px; color: var(--accent); font-size: 0.8rem; display: none; }

        .btn-group { margin-top: 40px; display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 15px 40px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-save { background: #2ECC71; color: white; }
    </style>
</head>
<body class="theme-simple">

<div class="container">
    <div class="theme-selector">
        <button class="theme-btn" onclick="changeTheme('simple')">⚪ 심플</button>
        <button class="theme-btn" onclick="changeTheme('cute')">🌸 귀여운</button>
        <button class="theme-btn" onclick="changeTheme('funny')">💛 재미있는</button>
        <button class="theme-btn" onclick="changeTheme('chic')">🕶️ 시크한</button>
        <button class="theme-btn" onclick="document.getElementById('color-picker').click()">🎨 직접 선택</button>
        <input type="color" id="color-picker" style="display:none;" onchange="changeCustomColor(this.value)">
    </div>

    <div id="setup-view" class="config-panel">
        <span class="secret-trigger" onclick="enableSecretMode()">✎</span>
        <h2 style="margin-top:0;">🏫 자리바꾸기 설정</h2>
        
        <div style="display: flex; gap: 10px; margin-bottom: 15px; justify-content: center;">
            <button class="theme-btn" id="btn-file" onclick="switchMethod('file')">📁 엑셀 업로드</button>
            <button class="theme-btn" id="btn-manual" onclick="switchMethod('manual')">⌨️ 직접 입력</button>
        </div>

        <div id="file-area" class="upload-box">
            <input type="file" id="excel-input" accept=".csv" onchange="loadStudents()">
        </div>

        <div id="manual-area" class="upload-box" style="display:none;">
            <textarea id="manual-input" placeholder="이름을 쉼표(,)나 줄바꿈으로 입력하세요."></textarea>
        </div>

        <div style="text-align: center;">
            <strong>분단 수:</strong>
            <select id="bundan-count">
                <option value="3">3분단 (6열)</option>
                <option value="4">4분단 (8열)</option>
                <option value="2">2분단 (4열)</option>
            </select>
            <button class="btn btn-main" style="margin-left:20px;" onclick="initClass()">설정 완료</button>
        </div>
        <p id="secret-notice" style="color:red; display:none; font-weight:bold; margin-top:15px;">🔒 시크릿 모드 활성화됨</p>
    </div>

    <div id="main-view" style="display:none;">
        <div id="capture-area">
            <div class="blackboard-container">
                <div class="blackboard">칠 판</div>
            </div>
            <div id="desk-grid" class="grid-layout"></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-accent" id="shuffle-btn" onclick="startShuffle()">자리 섞기 시작!</button>
            <button class="btn btn-save" onclick="saveAsImage()">결과 이미지 저장</button>
            <button class="btn" style="background:#94A3B8; color:white;" onclick="location.reload()">처음으로</button>
        </div>
    </div>
</div>

<script>
    let students = [];
    let fixedSeats = {}; 
    let isSecret = false;
    let currentMethod = 'file';

    // 배경 테마 변경 함수
    function changeTheme(theme) {
        document.body.className = 'theme-' + theme;
    }

    function changeCustomColor(color) {
        document.body.className = 'theme-custom';
        document.documentElement.style.setProperty('--custom-bg', color);
    }

    // 입력 방식 전환
    function switchMethod(method) {
        currentMethod = method;
        document.getElementById('file-area').style.display = method === 'file' ? 'block' : 'none';
        document.getElementById('manual-area').style.display = method === 'manual' ? 'block' : 'none';
    }

    // 학생 로드 및 초기화 (기존 로직 유지)
    function loadStudents() {
        const file = document.getElementById('excel-input').files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            students = e.target.result.split(/[\n,\r]/).map(s => s.trim()).filter(s => s && s !== '이름');
            alert(students.length + "명의 명단을 확인했습니다.");
        };
        reader.readAsText(file, 'EUC-KR');
    }

    function enableSecretMode() {
        isSecret = true;
        document.getElementById('secret-notice').style.display = 'block';
    }

    function initClass() {
        if(currentMethod === 'manual') {
            students = document.getElementById('manual-input').value.split(/[,\n]/).map(s => s.trim()).filter(s => s);
        }
        if(students.length === 0) return alert("학생 명단을 입력해주세요.");
        
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
        
        const grid = document.getElementById('desk-grid');
        const bundanCount = parseInt(document.getElementById('bundan-count').value);
        grid.innerHTML = '';

        const studentsPerBundan = Math.ceil(students.length / bundanCount);
        
        for(let b = 0; b < bundanCount; b++) {
            const bundanDiv = document.createElement('div');
            bundanDiv.className = 'bundan';
            for(let s = 0; s < studentsPerBundan; s++) {
                const idx = b * studentsPerBundan + s;
                if(idx < students.length) {
                    const div = document.createElement('div');
                    div.className = 'student-desk';
                    div.id = `desk-${idx}`;
                    div.innerHTML = `<span class="desk-num">${idx + 1}</span><span class="fixed-mark" id="mark-${idx}">📍</span><span id="name-${idx}">?</span>`;
                    div.onclick = () => {
                        if(isSecret) {
                            const name = prompt("고정할 학생 이름 입력:");
                            if(students.includes(name)) {
                                fixedSeats[idx] = name;
                                document.getElementById(`name-${idx}`).innerText = name;
                                document.getElementById(`mark-${idx}`).style.display = 'block';
                            }
                        }
                    };
                    bundanDiv.appendChild(div);
                }
            }
            grid.appendChild(bundanDiv);
        }
    }

    function startShuffle() {
        const btn = document.getElementById('shuffle-btn');
        btn.disabled = true;
        let count = 0;
        const interval = setInterval(() => {
            const temp = [...students].sort(() => Math.random() - 0.5);
            students.forEach((_, i) => {
                if(!fixedSeats[i]) {
                    const el = document.getElementById(`name-${i}`);
                    if(el) el.innerText = temp[i] || "?";
                }
            });
            if(++count > 15) {
                clearInterval(interval);
                const fixedNames = Object.values(fixedSeats);
                let pool = students.filter(s => !fixedNames.includes(s)).sort(() => Math.random() - 0.5);
                students.forEach((_, i) => {
                    if(!fixedSeats[i]) {
                        const el = document.getElementById(`name-${i}`);
                        if(el) el.innerText = pool.pop() || "-";
                    }
                });
                btn.innerText = "배치 완료!";
            }
        }, 80);
    }

    function saveAsImage() {
        html2canvas(document.getElementById('capture-area')).then(canvas => {
            const link = document.createElement('a');
            link.download = '자리배치도.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
