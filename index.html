<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>우리반 자리바꾸기 툴킷</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #4A90E2; --accent: #FF6B6B; --bg: #F0F7FF; --desk: #FFFFFF; --board: #2D5A27; }
        body { font-family: 'Nanum Gothic', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        
        /* 설정 섹션 (PDF 가이드 1~7단계 반영) */
        .config-panel { background: #F8FAFC; border: 2px solid #E2E8F0; padding: 20px; border-radius: 20px; margin-bottom: 20px; position: relative; }
        .secret-trigger { position: absolute; top: 15px; right: 20px; cursor: pointer; opacity: 0.2; font-size: 1.5rem; transition: 0.3s; }
        .secret-trigger:hover { opacity: 1; color: var(--primary); }
        
        .upload-box { border: 2px dashed var(--primary); padding: 20px; border-radius: 15px; background: white; margin-bottom: 15px; }
        .setup-controls { display: flex; justify-content: center; gap: 30px; align-items: center; font-size: 1.1rem; }
        select, input[type="file"] { padding: 8px 15px; border-radius: 8px; border: 1px solid #CBD5E1; }

        /* 배치 영역 (TV 화면용 대형 UI) */
        #capture-area { padding: 40px 20px; background: white; border-radius: 20px; }
        .blackboard { width: 60%; margin: 0 auto 50px; background: var(--board); color: white; padding: 20px; border-radius: 10px; border: 8px solid #5D4037; font-size: 2rem; font-weight: bold; box-shadow: 0 10px 0 #3E2723; }
        
        .grid-layout { display: grid; gap: 20px; justify-content: center; transition: all 0.5s ease; }
        .student-desk { width: 150px; height: 100px; background: var(--desk); border: 3px solid #CBD5E1; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; position: relative; box-shadow: 0 6px 0 #E2E8F0; }
        .desk-num { position: absolute; top: 8px; left: 10px; font-size: 0.9rem; color: #94A3B8; }
        .fixed-mark { position: absolute; top: 5px; right: 8px; color: var(--accent); font-size: 0.8rem; display: none; }

        /* 버튼류 */
        .btn-group { margin-top: 40px; display: flex; justify-content: center; gap: 15px; }
        .btn { padding: 15px 40px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 5px 0 #357ABD; }
        .btn-accent { background: var(--accent); color: white; box-shadow: 0 5px 0 #D64545; }
        .btn-save { background: #2ECC71; color: white; box-shadow: 0 5px 0 #27AE60; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-view" class="config-panel">
        <span class="secret-trigger" onclick="enableSecretMode()">✎</span>
        <h2 style="margin-top:0;">🏫 자리바꾸기 설정</h2>
        
        <div class="upload-box">
            <strong>1. 학생 명단 파일(CSV) 선택</strong><br><br>
            <input type="file" id="excel-input" accept=".csv" onchange="loadStudents()">
            <p style="font-size: 0.9rem; color: #64748B;">* 엑셀에서 '이름' 열을 작성 후 CSV로 저장해 주세요.</p>
        </div>

        <div class="setup-controls">
            <div>
                <strong>대형:</strong>
                <select id="layout-style">
                    <option value="6">3분단 (2-2-2)</option>
                    <option value="8">4분단 (2-2-2-2)</option>
                    <option value="7">모둠형 (2-3-2)</option>
                </select>
            </div>
            <button class="btn btn-main" onclick="initClass()">설정 완료</button>
        </div>
        <p id="secret-notice" style="color:red; display:none; font-weight:bold; margin-top:15px;">🔒 시크릿 모드: 자리를 클릭해 학생을 미리 배치하세요!</p>
    </div>

    <div id="main-view" style="display:none;">
        <div id="capture-area">
            <div class="blackboard">칠 판</div>
            <div id="desk-grid" class="grid-layout"></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-accent" id="shuffle-btn" onclick="startShuffle()">자리 섞기 시작!</button>
            <button class="btn btn-save" onclick="saveAsImage()">결과 이미지 저장</button>
            <button class="btn" style="background:#94A3B8; color:white;" onclick="location.reload()">처음으로</button>
        </div>
    </div>
</div>

<script>
    let students = [];
    let fixedSeats = {}; // {책상번호: 학생이름}
    let isSecret = false;

    // 1. 엑셀(CSV) 로드
    function loadStudents() {
        const file = document.getElementById('excel-input').files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const content = e.target.result;
            students = content.split(/[\n,\r]/).map(s => s.trim()).filter(s => s && s !== '이름');
            alert(`${students.length}명의 명단을 불러왔습니다.`);
        };
        reader.readAsText(file, 'EUC-KR');
    }

    // 2. 시크릿 모드 (PDF 4단계 반영)
    function enableSecretMode() {
        isSecret = true;
        document.getElementById('secret-notice').style.display = 'block';
        alert("시크릿 모드 활성화! 설정 완료 후 책상을 클릭해 자리를 고정할 수 있습니다.");
    }

    // 3. 교실 초기화
    function initClass() {
        if(students.length === 0) return alert("먼저 학생 명단 파일을 업로드해 주세요.");
        
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
        
        const grid = document.getElementById('desk-grid');
        const cols = document.getElementById('layout-style').value;
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        grid.innerHTML = '';
        students.forEach((_, i) => {
            const div = document.createElement('div');
            div.className = 'student-desk';
            div.innerHTML = `
                <span class="desk-num">${i+1}</span>
                <span class="fixed-mark" id="mark-${i}">📍고정</span>
                <span id="name-${i}">?</span>
            `;
            div.onclick = () => setFixedSeat(i);
            grid.appendChild(div);
        });
    }

    // 4. 자리 고정 (시크릿 기능)
    function setFixedSeat(index) {
        if(!isSecret) return;
        const name = prompt(`이 자리에 고정할 학생 이름:\n(${students.join(', ')})`);
        if(students.includes(name)) {
            fixedSeats[index] = name;
            document.getElementById(`name-${index}`).innerText = name;
            document.getElementById(`mark-${index}`).style.display = 'block';
            document.getElementById(`name-${index}`).parentElement.style.borderColor = 'var(--accent)';
        }
    }

    // 5. 자리 섞기 (애니메이션 효과)
    function startShuffle() {
        const btn = document.getElementById('shuffle-btn');
        btn.disabled = true;
        
        let count = 0;
        const interval = setInterval(() => {
            const tempPool = [...students].sort(() => Math.random() - 0.5);
            students.forEach((_, i) => {
                if(!fixedSeats[i]) {
                    document.getElementById(`name-${i}`).innerText = tempPool[i] || "?";
                }
            });
            count++;
            if(count > 10) {
                clearInterval(interval);
                finalizeShuffle();
            }
        }, 100);
    }

    function finalizeShuffle() {
        const fixedNames = Object.values(fixedSeats);
        let randomPool = students.filter(s => !fixedNames.includes(s)).sort(() => Math.random() - 0.5);

        students.forEach((_, i) => {
            if(!fixedSeats[i]) {
                document.getElementById(`name-${i}`).innerText = randomPool.pop() || "-";
            }
        });
        document.getElementById('shuffle-btn').innerText = "배치 완료!";
        alert("자리가 성공적으로 배치되었습니다.");
    }

    // 6. 이미지 저장 기능
    function saveAsImage() {
        const area = document.getElementById('capture-area');
        html2canvas(area).then(canvas => {
            const link = document.createElement('a');
            link.download = '우리반_자리배치도.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
